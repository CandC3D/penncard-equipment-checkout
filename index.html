<!-- Equipment Checkout v1.1 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>PennCard Equipment Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="h-left">
    <span class="h-unit">PennCard Center</span>
    <span class="h-app">Equipment Checkout</span>
    <span class="h-unit" style="border-right:none;padding-right:0;padding-left:0;">v1.1.1 CODEX</span>
  </div>
  <span class="h-date" id="hDate"></span>
</header>

<div class="shell">

  <!-- ── Sidebar ── -->
  <aside>
    <div id="sidebar"></div>
    <div class="sb-backup">
      <div class="sb-backup-hd">Data Backup</div>
      <div class="bb-last" id="sbLastBackup"></div>
      <div class="sb-backup-btns">
        <button class="btn-backup" id="btnExportBackup">↓ Export backup (.json)</button>
        <button class="btn-backup restore" id="btnRestoreBackup">↑ Restore from backup…</button>
        <input type="file" id="importFile" accept=".json">
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main>
    <div id="backupBanner"></div>
    <div id="storageBanner"></div>
    <div class="tabs">
      <button class="tab on" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="history">Checkout History</button>
      <button class="tab" data-tab="calendar">Calendar</button>
    </div>

    <!-- Dashboard -->
    <div class="pane on" id="pane-dashboard">
      <div class="stats" id="statsRow"></div>
      <div id="ovBanner"></div>
      <div id="actionBar"></div>
      <div class="filter-row" id="filterRow">
        <button class="fil on" data-filter="all">All</button>
        <button class="fil" data-filter="reader">Readers</button>
        <button class="fil" data-filter="hotspot">Hotspots</button>
        <button class="fil" data-filter="charger">Charger Sets</button>
      </div>
      <div class="sec">Available</div>
      <div class="grid" id="gridAvail"></div>
      <div id="checkedOutSection"></div>
    </div>

    <!-- History -->
    <div class="pane" id="pane-history">
      <div class="export-bar">
        <span class="export-lbl">Export</span>
        <div class="export-btns">
          <button class="btn btn-ghost btn-sm" id="btnExportHistory">↓ Rental History (.csv)</button>
          <button class="btn btn-ghost btn-sm" id="btnExportInventory">↓ Inventory Snapshot (.csv)</button>
        </div>
      </div>
      <div class="hist-wrap">
        <div class="hist-top">
          <input class="hsearch" id="hsearch" type="text" placeholder="Search event, org, or item…">
          <span class="hist-count" id="histCount"></span>
        </div>
        <div id="histBody"></div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="pane" id="pane-calendar">
      <div class="cal-toolbar">
        <div class="cal-views">
          <button class="cal-view on" data-cal-view="month">Month</button>
          <button class="cal-view" data-cal-view="timeline">Timeline</button>
          <button class="cal-view" data-cal-view="event">Event</button>
        </div>
        <div class="cal-nav">
          <button class="cal-nav-btn" id="btnCalPrev">‹</button>
          <span class="cal-nav-label" id="calLabel"></span>
          <button class="cal-nav-btn" id="btnCalNext">›</button>
          <button class="cal-today-btn" id="btnCalToday">Today</button>
        </div>
      </div>
      <div class="cal-legend" id="calLegend"></div>
      <div id="calBody"></div>
    </div>
  </main>
</div>

<!-- ── Checkout Modal ── -->
<div class="overlay" id="oCO">
  <div class="modal">
    <div class="modal-title">Check Out Equipment</div>
    <div class="modal-sub" id="coSub">Complete the details below</div>
    <div class="co-items" id="coItemList"></div>
    <div class="fgrp">
      <label class="flbl" for="fEvent">Event Name *</label>
      <input class="finput" id="fEvent" type="text" placeholder="e.g., NSO Welcome Week">
      <div class="ferr" id="eEvent">Event name is required.</div>
    </div>
    <div class="fgrp">
      <label class="flbl" for="fOrg">Organization / Department *</label>
      <input class="finput" id="fOrg" type="text" placeholder="e.g., Student Activities">
      <div class="ferr" id="eOrg">Organization is required.</div>
    </div>
    <div class="frow">
      <div class="fgrp">
        <label class="flbl" for="fCoDate">Checkout Date *</label>
        <input class="finput" id="fCoDate" type="date">
        <div class="ferr" id="eCo">Required.</div>
      </div>
      <div class="fgrp">
        <label class="flbl" for="fRetDate">Expected Return *</label>
        <input class="finput" id="fRetDate" type="date">
        <div class="ferr" id="eRet">Return date required.</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" data-close-modal="oCO">Cancel</button>
      <button class="btn btn-blue" id="btnConfirmCheckout">✓ Check Out</button>
    </div>
  </div>
</div>

<!-- ── Check-In Modal ── -->
<div class="overlay" id="oCI">
  <div class="modal">
    <div class="modal-title">Return Equipment</div>
    <div class="modal-sub" id="ciSub"></div>
    <div class="ci-box" id="ciBox"></div>
    <div class="fgrp">
      <label class="flbl" for="fActual">Actual Return Date *</label>
      <input class="finput" id="fActual" type="date">
      <div class="ferr" id="eActual">Return date required.</div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" data-close-modal="oCI">Cancel</button>
      <button class="btn btn-ok" id="btnConfirmCheckin">✓ Confirm Return</button>
    </div>
  </div>
</div>

<!-- ── Confirm Dialog ── -->
<div class="overlay" id="oCFM">
  <div class="modal cdlg">
    <div class="modal-title" id="cfmTitle"></div>
    <div class="modal-sub" style="margin-bottom:14px"></div>
    <div class="cdlg-body" id="cfmBody"></div>
    <div class="cdlg-btns">
      <button class="btn btn-ghost" data-close-modal="oCFM">Cancel</button>
      <button class="btn btn-danger" id="cfmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="app.js" defer></script>

</body>
</html>
